spring.application.name=taskhub
server.port=9090
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Taskhub;encrypt=false;trustServerCertificate=true
spring.datasource.username=webtaskhub
spring.datasource.password=123
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
